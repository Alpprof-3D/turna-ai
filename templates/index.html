<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turna AI | 2018 Edition</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; color: #353740; }
        .header { padding: 15px; border-bottom: 1px solid #d9d9e3; text-align: center; font-weight: 600; letter-spacing: 1px; color: #10a37f; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background-color: #f7f7f8; border: 1px solid #d9d9e3; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: #e7f3ef; border: 1px solid #10a37f; border-bottom-left-radius: 2px; }
        .input-container { padding: 20px; border-top: 1px solid #d9d9e3; background: white; }
        .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; position: relative; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #d9d9e3; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.05); outline: none; font-size: 16px; }
        button { background: #10a37f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .loading { font-size: 12px; color: #8e8ea0; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="header">TURNA AI <small style="color: #8e8ea0; font-weight: normal;">v1.0</small></div>
    
    <div id="chat-window">
        <div class="message ai">Merhaba! Ben Turna AI. Size nasıl yardımcı olabilirim?</div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
        <div id="loading" class="loading" style="text-align: center;">Turna düşünüyor...</div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const loading = document.getElementById('loading');

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // Kullanıcı mesajı
            addMessage(text, 'user');
            input.value = '';
            loading.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.response, 'ai');
            } catch (err) {
                addMessage("Üzgünüm, bir hata oluştu.", 'ai');
            } finally {
                loading.style.display = 'none';
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
